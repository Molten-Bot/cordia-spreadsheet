<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta
      name="description"
      content="A full-screen public spreadsheet that saves one working sheet locally in your browser and exports CSV or JSON."
    >
    <title>Spreadsheet</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local browser sheet</p>
          <h1>Spreadsheet</h1>
        </div>
        <nav class="nav" aria-label="Primary">
          <a href="#sheet" aria-current="page">Sheet</a>
          <a href="#downloads">Downloads</a>
        </nav>
      </header>

      <main id="main">
        <section class="sheet-panel" id="sheet" aria-labelledby="sheet-title">
          <div class="sheet-toolbar">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Single shared canvas</p>
                <h2 id="sheet-title">Working spreadsheet</h2>
              </div>
              <span class="save-state" id="save-state" role="status">Saved locally</span>
            </div>
            <div class="sheet-actions" id="downloads" aria-label="Downloads and sheet actions">
              <button class="button secondary" id="download-csv" type="button">Download CSV</button>
              <button class="button secondary" id="download-json" type="button">Download JSON</button>
              <button class="button danger" id="clear-sheet" type="button">Clear sheet</button>
            </div>
          </div>

          <div class="sheet-wrap" aria-live="polite">
            <table class="spreadsheet" id="spreadsheet-grid" aria-label="Editable spreadsheet"></table>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span>One sheet. Browser storage. No account.</span>
        <span id="cell-count">0 cells saved</span>
      </footer>
    </div>
  </body>
</html>
