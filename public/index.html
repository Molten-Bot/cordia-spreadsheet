<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta
      name="description"
      content="A full-screen public spreadsheet that saves one working sheet locally in your browser and exports CSV or JSON."
    >
    <title>Spreadsheet</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-shell">
      <main id="main">
        <section class="sheet-panel" id="sheet" aria-labelledby="sheet-title">
          <div class="sheet-toolbar">
            <div class="section-heading">
              <h1 id="sheet-title">Spreadsheet</h1>
              <span class="save-state" id="save-state" role="status">Saved locally</span>
            </div>
            <div class="sheet-actions" id="downloads" aria-label="Downloads and sheet actions">
              <button class="button secondary icon-button csv-icon" id="download-csv" type="button" aria-label="Download CSV" title="Download CSV">
                <span class="button-icon" aria-hidden="true"></span>
                <span class="sr-only">Download CSV</span>
              </button>
              <button class="button secondary icon-button json-icon" id="download-json" type="button" aria-label="Download JSON" title="Download JSON">
                <span class="button-icon" aria-hidden="true"></span>
                <span class="sr-only">Download JSON</span>
              </button>
              <button class="button danger icon-button clear-icon" id="clear-sheet" type="button" aria-label="Clear sheet" title="Clear sheet">
                <span class="button-icon" aria-hidden="true"></span>
                <span class="sr-only">Clear sheet</span>
              </button>
            </div>
          </div>

          <div class="sheet-wrap" id="sheet-wrap" aria-live="polite">
            <div class="spreadsheet" id="spreadsheet-grid" role="grid" aria-label="Editable spreadsheet"></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span>One sheet. Browser storage. No account.</span>
        <span id="cell-count">0 cells saved</span>
      </footer>
    </div>
  </body>
</html>
